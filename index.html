<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PWEG AI</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;800&display=swap" rel="stylesheet">

</head>


<body>


<div class="background"></div>



<header>

    <div class="ai-avatar">

        🤖

    </div>


    <h1>
        PWEG AI
    </h1>


    <p>
        هوش مصنوعی اختصاصی Play With Elia Gamer
    </p>


</header>



<main>

<div class="account-box">

<h2>🤖 وضعیت هوش مصنوعی</h2>

<p id="messageStatus">
پیام رایگان امروز: 10 / 10
</p>

<button id="rulesBtn">
📜 قوانین استفاده از PWEG AI
</button>

</div>


<div class="rules-overlay" id="rulesOverlay">

<div class="rules-box">

<button id="closeRules">
✕
</button>

<h2>
📜 قوانین PWEG AI
</h2>

<p>

1- هر کاربر روزانه 10 پیام رایگان دارد.

<br><br>

2- پیام‌های استفاده نشده روزانه به روز بعد منتقل نمی‌شوند.

</p>


<label>

<input type="checkbox" id="acceptRules">

قوانین را قبول دارم.

</label>


</div>

</div>
  
  
<div class="chat-box">


<div class="messages" id="messages">


<div class="message ai">

سلام 👋  
من هوش مصنوعی PWEG هستم.
چطور می‌توانم کمکت کنم؟ 🎮🤖

</div>


</div>



<div class="typing" id="typing">

<span></span>
<span></span>
<span></span>

</div>



<div class="input-area">


<input 
id="userInput"
placeholder="پیام خود را بنویسید..."
>


<button id="sendBtn">

ارسال

</button>


</div>



</div>


</main>



<script src="script.js"></script>


</body>

</html>
